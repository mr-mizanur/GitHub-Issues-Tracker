<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



    <title>GitHub Issues Tracker</title>
</head>
<body>
    <main>
     <section class="flex items-center justify-center p-10 border border-2 m-7">
      <div class="text-center">
        <img src="./assets/github-logo.png" alt="GitHub" class="mx-auto w-20">
        <h1 class="text-2xl font-bold mt-4">GitHub Issues Tracker</h1>
        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>
 
     </section>
  <div class="flex items-center justify-center ">
  <form class="flex flex-col items-start gap-2">
    <label>Username</label>
    <input type="text" placeholder="Enter Username" class="border p-2 rounded">
    <p class="text-sm text-gray-500">Default: admin</p>
    <label>Password</label>
    <input type="password" placeholder="Enter Password" class="border p-2 rounded">
    <p class="text-sm text-gray-500">Default: admin123</p>
  </form>
</div>
     </main>
</body>
</html>
