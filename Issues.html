<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<title>GitHub Issues Tracker</title>
</head>

<body class="bg-[#ecf0f1]">

<header>

<div class="navbar bg-base-100 shadow-sm">

  <div class="flex-1">
     
     <div class="flex items-center gap-2 mx-5">
        <img src="./assets/github-logo.png" class="w-8">
        <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
     </div>
  
  </div>

  <div class="flex-none">
  
  <label class="input input-bordered flex items-center gap-2">
  
  <svg class="h-[1em] opacity-50"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24">
  
  <g stroke-linejoin="round"
  stroke-linecap="round"
  stroke-width="2.5"
  fill="none"
  stroke="currentColor">
  
  <circle cx="11" cy="11" r="8"/>
  <path d="m21 21-4.3-4.3"/>
  
  </g>
  </svg>
  
  <input id="searchInput" type="search" placeholder="Search Issues"/>
  
  </label>
  
  </div>
  
  </div>
  
</header>

<main class="px-12">



<div id="btnContener"
class="bg-white my-5 flex gap-4 p-3 rounded shadow">

<button id="btnAll" class="btn btn-primary">
All
</button>

<button id="btnOpen" class="btn">
Open
</button>

<button id="btnClosed" class="btn">
Closed
</button>

</div>



<section class="bg-white p-4 rounded shadow flex justify-between items-center mb-6">

<div class="flex items-center gap-3">

<img src="./assets/Aperture.png" class="w-8">

<div>

<h3 id="issueCount" class="font-bold text-lg">
0 Issues
</h3>

<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>

</div>

</div>

<div class="flex gap-5 text-sm">

<div class="flex items-center gap-2">

<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open

</div>

<div class="flex items-center gap-2">

<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed

</div>

</div>

</section>



<section id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

</section>

</main>

<script src="./script/Issues.js"></script>

</body>
</html>
